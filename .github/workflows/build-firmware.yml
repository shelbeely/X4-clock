name: Build Firmware & Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO Core
        run: pip install platformio

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-espressif32-${{ hashFiles('firmware/platformio.ini') }}
          restore-keys: |
            pio-espressif32-

      - name: Fetch mquickjs and generate stdlib headers
        run: bash firmware/scripts/fetch_mquickjs.sh

      - name: Build firmware
        run: cd firmware && pio run

      - name: Prepare GitHub Pages site
        run: |
          mkdir -p www

          # Copy firmware binaries
          cp firmware/.pio/build/x4/firmware.bin    www/
          cp firmware/.pio/build/x4/bootloader.bin  www/
          cp firmware/.pio/build/x4/partitions.bin  www/

          # Derive a version string from the short commit SHA
          VERSION="$(git rev-parse --short HEAD)"

          # Generate the ESP Web Tools manifest
          cat > www/manifest.json <<EOF
          {
            "name": "Xteink X4",
            "version": "${VERSION}",
            "new_install_prompt_erase": true,
            "builds": [
              {
                "chipFamily": "ESP32-C3",
                "parts": [
                  { "path": "bootloader.bin", "offset": 0 },
                  { "path": "partitions.bin", "offset": 32768 },
                  { "path": "firmware.bin",   "offset": 65536 }
                ]
              }
            ]
          }
          EOF

          # Generate the installer web page
          cat > www/index.html <<'HTMLEOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0" />
            <title>Xteink X4 — Web Installer</title>
            <script
              type="module"
              src="https://unpkg.com/esp-web-tools@10/dist/web/install-button.js?module"
            ></script>
            <style>
              :root {
                --bg:   #0d0d0d;
                --card: #1a1a1a;
                --border: #2e2e2e;
                --accent: #e0e0e0;
                --muted: #888;
                font-family: system-ui, sans-serif;
              }
              * { box-sizing: border-box; margin: 0; padding: 0; }
              body {
                background: var(--bg);
                color: var(--accent);
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 2rem;
              }
              .card {
                background: var(--card);
                border: 1px solid var(--border);
                border-radius: 12px;
                padding: 2.5rem 3rem;
                max-width: 480px;
                width: 100%;
                text-align: center;
              }
              .logo {
                font-size: 2.5rem;
                margin-bottom: 0.25rem;
              }
              h1 {
                font-size: 1.6rem;
                font-weight: 700;
                letter-spacing: -0.02em;
                margin-bottom: 0.4rem;
              }
              .subtitle {
                color: var(--muted);
                font-size: 0.9rem;
                margin-bottom: 2rem;
              }
              esp-web-install-button {
                --esp-tools-button-color: #ffffff;
                --esp-tools-button-text-color: #0d0d0d;
              }
              .steps {
                text-align: left;
                margin-top: 2rem;
                border-top: 1px solid var(--border);
                padding-top: 1.5rem;
              }
              .steps h2 {
                font-size: 0.85rem;
                text-transform: uppercase;
                letter-spacing: 0.06em;
                color: var(--muted);
                margin-bottom: 0.8rem;
              }
              .steps ol {
                padding-left: 1.2rem;
                font-size: 0.9rem;
                line-height: 1.7;
                color: #bbb;
              }
              .steps li + li { margin-top: 0.25rem; }
              .note {
                margin-top: 1.5rem;
                font-size: 0.78rem;
                color: var(--muted);
              }
              a { color: #aaa; }
            </style>
          </head>
          <body>
            <div class="card">
              <div class="logo">⌚</div>
              <h1>Xteink X4</h1>
              <p class="subtitle">ESP32-C3 · 4.26&quot; E-Ink Smartwatch</p>

              <esp-web-install-button manifest="manifest.json">
                <button slot="activate">Install / Update Firmware</button>
              </esp-web-install-button>

              <div class="steps">
                <h2>How to install</h2>
                <ol>
                  <li>Connect the X4 to your computer via USB.</li>
                  <li>Click <strong>Install / Update Firmware</strong> above.</li>
                  <li>Select the correct serial port when prompted.</li>
                  <li>Wait for the flash to complete (typically 1–3 minutes).</li>
                  <li>The watch will reboot automatically.</li>
                </ol>
              </div>

              <p class="note">
                Requires a Chromium-based browser (Chrome, Edge, or Opera).<br />
                Source code on
                <a href="https://github.com/shelbeely/X4-clock" target="_blank" rel="noopener">
                  GitHub
                </a>.
              </p>
            </div>
          </body>
          </html>
          HTMLEOF

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: www/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
