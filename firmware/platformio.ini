; Xteink X4 — Base Firmware
; ESP32-C3, 16 MB flash, GxEPD2 display, SdFat, mquickjs JS runtime

[env:x4]
platform     = espressif32
board        = esp32-c3-devkitm-1
framework    = arduino

board_build.partitions = partitions.csv

upload_speed  = 921600
monitor_speed = 115200

build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -std=gnu++2a
    ; mquickjs: small/optimised build, no BigNum
    -DCONFIG_SMALL=1
    ; Generated mquickjs bytecode tables use negative int literals stored in
    ; uint32_t arrays — a pre-existing pattern in the code generator that is
    ; functionally correct (2's complement) but triggers -Wnarrowing in C++11+.
    -Wno-narrowing

lib_deps =
    zinggjm/GxEPD2 @ ^1.5.9
    greiman/SdFat  @ ^2.2.0

; chain+ scans all source files (including headers) for transitive includes,
; which allows PlatformIO to detect and compile the local mquickjs library.
lib_ldf_mode = chain+

; Explicitly compile mquickjs C sources (LDF alone does not always generate
; build commands for local pure-C libraries).
extra_scripts = pre:extra_build.py
