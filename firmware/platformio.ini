; Xteink X4 — Base Firmware
; ESP32-C3, 16 MB flash, GxEPD2 display, SdFat, mquickjs JS runtime

[env:x4]
platform     = espressif32
board        = esp32-c3-devkitm-1
framework    = arduino

board_build.partitions = partitions.csv

upload_speed  = 921600
monitor_speed = 115200

build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -std=gnu++2a
    ; mquickjs: small/optimised build, no BigNum
    -DCONFIG_SMALL=1

lib_deps =
    zinggjm/GxEPD2 @ ^1.5.9
    greiman/SdFat  @ ^2.2.0

; mquickjs lives as a local library under firmware/lib/
lib_extra_dirs = lib
